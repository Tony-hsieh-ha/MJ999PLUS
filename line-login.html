<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入 - MJ999</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }
        
        .line-logo {
            width: 80px;
            height: 80px;
            background: #00C300;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 40px;
            color: white;
            font-weight: bold;
        }
        
        h2 {
            margin: 0 0 10px 0;
            color: #FFD700;
            font-size: 24px;
        }
        
        p {
            margin: 0 0 30px 0;
            opacity: 0.8;
            font-size: 16px;
        }
        
        .line-login-btn {
            background: #00C300;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .line-login-btn:hover {
            background: #00A000;
            transform: translateY(-2px);
        }
        
        .error {
            color: #ff4444;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }
        
        .success {
            color: #00C300;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 195, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(0, 195, 0, 0.3);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00C300;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="line-logo">LINE</div>
        <h2>MJ999 智能配對系統</h2>
        <p>使用您的 LINE 帳號登入</p>
        
        <div id="login-content">
            <button id="line-login-btn" class="line-login-btn">
                <span>🟢</span>
                使用 LINE 帳號登入
            </button>
        </div>
        
        <div id="loading-content" class="hidden">
            <div class="spinner"></div>
            <p>正在連接 LINE...</p>
        </div>
        
        <div id="status-message"></div>
    </div>

    <script>
        console.log('LINE Login Page Loaded');
        
        // LINE Login 配置
        const LINE_LOGIN_CONFIG = {
            // 請替換為您的實際 Channel ID
            channelId: '2004473747', // 您的 LINE Channel ID
            redirectUri: window.location.origin + '/',
            state: 'mj999_' + Date.now(),
            scope: 'profile openid email',
            nonce: 'mj999_nonce_' + Date.now()
        };

        // 檢查 URL 參數
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                state: params.get('state'),
                error: params.get('error'),
                error_description: params.get('error_description')
            };
        }

        // 顯示載入狀態
        function showLoading() {
            document.getElementById('login-content').classList.add('hidden');
            document.getElementById('loading-content').classList.remove('hidden');
        }

        // 顯示錯誤訊息
        function showError(message) {
            const statusElement = document.getElementById('status-message');
            statusElement.innerHTML = `<div class="error">${message}</div>`;
        }

        // 顯示成功訊息
        function showSuccess(message) {
            const statusElement = document.getElementById('status-message');
            statusElement.innerHTML = `<div class="success">${message}</div>`;
        }

        // 處理 LINE 登入回調
        async function handleLineCallback() {
            const params = getUrlParams();
            
            try {
                // 檢查是否有錯誤
                if (params.error) {
                    throw new Error(params.error_description || params.error);
                }

                // 檢查 state 參數
                if (params.state !== LINE_LOGIN_CONFIG.state) {
                    throw new Error('State 驗證失敗，可能為安全攻擊');
                }

                // 如果有 code 參數，處理登入
                if (params.code) {
                    showLoading();
                    showSuccess('正在驗證您的身份...');
                    
                    // 發送 code 到後端處理（這裡先用前端模擬）
                    await processLineCode(params.code);
                } else {
                    // 沒有 code，顯示登入按鈕
                    showLoginButton();
                }
                
            } catch (error) {
                console.error('LINE 登入錯誤:', error);
                showError('登入失敗: ' + error.message);
                
                // 5秒後顯示登入按鈕
                setTimeout(() => {
                    showLoginButton();
                }, 5000);
            }
        }

        // 處理 LINE 授權碼
        async function processLineCode(code) {
            try {
                // 實際應用中，您需要將這個 code 發送到您的後端伺服器
                // 後端會用 code 向 LINE API 換取 access token 和用戶資料
                
                // 這裡先模擬後端回應
                const response = await fetch('/api/line-auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: code,
                        redirectUri: LINE_LOGIN_CONFIG.redirectUri
                    })
                });

                if (!response.ok) {
                    throw new Error('認證失敗');
                }

                const userData = await response.json();
                
                // 儲存用戶資料
                sessionStorage.setItem('line_user_data', JSON.stringify(userData));
                
                showSuccess('登入成功！正在跳轉...');
                
                // 2秒後跳轉到主頁面
                setTimeout(() => {
                    window.location.href = LINE_LOGIN_CONFIG.redirectUri;
                }, 2000);
                
            } catch (error) {
                console.error('處理 LINE code 錯誤:', error);
                
                // 如果後端不可用，顯示設定說明
                showError('請先設定 LINE Developers Console 和後端 API');
                
                setTimeout(() => {
                    showLoginButton();
                }, 3000);
            }
        }

        // 顯示登入按鈕
        function showLoginButton() {
            document.getElementById('login-content').classList.remove('hidden');
            document.getElementById('loading-content').classList.add('hidden');
            document.getElementById('status-message').innerHTML = '';
        }

        // 重定向到 LINE 登入
        function redirectToLineLogin() {
            console.log('Redirecting to LINE Login...');
            
            if (LINE_LOGIN_CONFIG.channelId === 'YOUR_CHANNEL_ID') {
                showError('請先設定您的 LINE Channel ID');
                return;
            }
            
            const authUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code&` +
                `client_id=${LINE_LOGIN_CONFIG.channelId}&` +
                `redirect_uri=${encodeURIComponent(LINE_LOGIN_CONFIG.redirectUri)}&` +
                `state=${LINE_LOGIN_CONFIG.state}&` +
                `scope=${LINE_LOGIN_CONFIG.scope}&` +
                `nonce=${LINE_LOGIN_CONFIG.nonce}&` +
                `bot_prompt=aggressive`;
            
            window.location.href = authUrl;
        }

        // 綁定登入按鈕事件
        document.getElementById('line-login-btn').addEventListener('click', redirectToLineLogin);

        // 頁面載入完成後處理
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, checking for callback...');
            handleLineCallback();
        });
    </script>
</body>
</html>
