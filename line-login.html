<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入 - MJ999</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }
        
        .line-logo {
            width: 80px;
            height: 80px;
            background: #00C300;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 40px;
            color: white;
            font-weight: bold;
        }
        
        h2 {
            margin: 0 0 10px 0;
            color: #FFD700;
            font-size: 24px;
        }
        
        p {
            margin: 0 0 30px 0;
            opacity: 0.8;
            font-size: 16px;
        }
        
        .line-login-btn {
            background: #00C300;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .line-login-btn:hover {
            background: #00A000;
            transform: translateY(-2px);
        }
        
        .error {
            color: #ff4444;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }
        
        .success {
            color: #00C300;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 195, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(0, 195, 0, 0.3);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00C300;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="line-logo">LINE</div>
        <h2>MJ999 智能配對系統</h2>
        <p>使用您的 LINE 帳號登入</p>
        
        <div id="login-content">
            <button id="line-login-btn" class="line-login-btn">
                <span>🟢</span>
                使用 LINE 帳號登入
            </button>
        </div>
        
        <div id="loading-content" class="hidden">
            <div class="spinner"></div>
            <p>正在連接 LINE...</p>
        </div>
        
        <div id="status-message"></div>
    </div>

    <script>
        console.log('LINE Login Page Loaded');
        
        // LINE Login 配置
        const LINE_LOGIN_CONFIG = {
            // 您的正確 Channel ID
            channelId: '2009653134', // 您的 LINE Channel ID
            // 修正 redirectUri，確保指向正確的登入頁面
            redirectUri: window.location.origin + '/line-login.html',
            state: 'mj999_' + Date.now(),
            scope: 'profile openid email',
            nonce: 'mj999_nonce_' + Date.now(),
            // Channel Secret (僅供參考，前端不使用)
            channelSecret: 'c0cf92398cab27e13a8402501489ff0e'
        };

        // 檢查 URL 參數
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                state: params.get('state'),
                error: params.get('error'),
                error_description: params.get('error_description')
            };
        }

        // 顯示載入狀態
        function showLoading() {
            document.getElementById('login-content').classList.add('hidden');
            document.getElementById('loading-content').classList.remove('hidden');
        }

        // 顯示錯誤訊息
        function showError(message) {
            const statusElement = document.getElementById('status-message');
            statusElement.innerHTML = `<div class="error">${message}</div>`;
        }

        // 顯示成功訊息
        function showSuccess(message) {
            const statusElement = document.getElementById('status-message');
            statusElement.innerHTML = `<div class="success">${message}</div>`;
        }

        // 處理 LINE 登入回調
        async function handleLineCallback() {
            const params = getUrlParams();
            
            try {
                // 檢查是否有錯誤
                if (params.error) {
                    throw new Error(params.error_description || params.error);
                }

                // 檢查 state 參數
                if (params.state !== LINE_LOGIN_CONFIG.state) {
                    throw new Error('State 驗證失敗，可能為安全攻擊');
                }

                // 如果有 code 參數，處理登入
                if (params.code) {
                    showLoading();
                    showSuccess('正在驗證您的身份...');
                    
                    // 發送 code 到後端處理（這裡先用前端模擬）
                    await processLineCode(params.code);
                } else {
                    // 沒有 code，顯示登入按鈕
                    showLoginButton();
                }
                
            } catch (error) {
                console.error('LINE 登入錯誤:', error);
                showError('登入失敗: ' + error.message);
                
                // 5秒後顯示登入按鈕
                setTimeout(() => {
                    showLoginButton();
                }, 5000);
            }
        }

        // 處理 LINE 授權碼
        async function processLineCode(code) {
            try {
                console.log('Processing LINE code:', code);
                
                // 先嘗試後端 API
                try {
                    const response = await fetch('/api/line-auth', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            code: code,
                            redirectUri: LINE_LOGIN_CONFIG.redirectUri
                        })
                    });

                    if (response.ok) {
                        const userData = await response.json();
                        console.log('Backend auth success:', userData);
                        
                        // 儲存用戶資料
                        sessionStorage.setItem('line_user_data', JSON.stringify(userData));
                        
                        showSuccess('登入成功！正在跳轉...');
                        
                        // 2秒後跳轉到主頁面
                        setTimeout(() => {
                            window.location.href = window.location.origin + '/';
                        }, 2000);
                        
                        return;
                    }
                } catch (backendError) {
                    console.log('Backend not available, using frontend fallback:', backendError);
                }
                
                // 後端不可用，使用前端直接處理（僅用於開發測試）
                console.log('Using frontend LINE token exchange...');
                showSuccess('正在獲取用戶資料...');
                
                // 直接用前端獲取 token（注意：這僅適用於開發測試）
                const tokenResponse = await fetch('https://api.line.me/oauth2/v2.1/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: LINE_LOGIN_CONFIG.redirectUri,
                        client_id: LINE_LOGIN_CONFIG.channelId,
                        client_secret: LINE_LOGIN_CONFIG.channelSecret,
                    })
                });
                
                if (!tokenResponse.ok) {
                    throw new Error('Token exchange failed: ' + tokenResponse.statusText);
                }
                
                const tokenData = await tokenResponse.json();
                console.log('Token received:', tokenData);
                
                // 獲取用戶資料
                const profileResponse = await fetch('https://api.line.me/v2/profile', {
                    headers: {
                        Authorization: `Bearer ${tokenData.access_token}`
                    }
                });
                
                if (!profileResponse.ok) {
                    throw new Error('Profile fetch failed: ' + profileResponse.statusText);
                }
                
                const profileData = await profileResponse.json();
                console.log('Profile received:', profileData);
                
                // 格式化用戶資料
                const userData = {
                    userId: profileData.userId,
                    displayName: profileData.displayName,
                    pictureUrl: profileData.pictureUrl,
                    email: profileData.email || null,
                    statusMessage: profileData.statusMessage || '今天天氣真好！',
                    friends: Math.floor(Math.random() * 500) + 50 // 模擬好友數
                };
                
                // 儲存用戶資料
                sessionStorage.setItem('line_user_data', JSON.stringify(userData));
                
                showSuccess('登入成功！正在跳轉...');
                
                // 2秒後跳轉到主頁面
                setTimeout(() => {
                    window.location.href = window.location.origin + '/';
                }, 2000);
                
            } catch (error) {
                console.error('處理 LINE code 錯誤:', error);
                
                // 如果所有方法都失敗，顯示具體錯誤並提供模擬選項
                showError('LINE 登入失敗: ' + error.message + '，點擊下方按鈕使用模擬登入');
                
                // 顯示模擬登入按鈕
                setTimeout(() => {
                    const statusElement = document.getElementById('status-message');
                    statusElement.innerHTML += `
                        <br><br>
                        <button onclick="simulateLineLogin()" style="background: #00C300; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                            使用模擬登入
                        </button>
                    `;
                }, 1000);
            }
        }

        // 模擬 LINE 登入（備用方案）
        function simulateLineLogin() {
            console.log('Switching to simulated LINE login...');
            
            // 創建模擬用戶資料 - 使用更真實的 LINE 用戶格式
            const lineNames = [
                '王小明', '李美華', '陳志強', '林雅婷', '張偉倫',
                '陳淑芬', '劉德華', '張曼玉', '周潤發', '梁朝偉',
                '林志玲', '蔡依林', '周杰倫', '王力宏', '林俊傑'
            ];
            
            const randomName = lineNames[Math.floor(Math.random() * lineNames.length)];
            const randomSuffix = Math.floor(Math.random() * 999);
            
            const mockUserData = {
                userId: 'U' + Math.random().toString(36).substr(2, 9).toUpperCase(),
                displayName: randomName + (randomSuffix > 100 ? randomSuffix : ''),
                pictureUrl: `https://i.pravatar.cc/80?u=${Math.random().toString(36).substr(2, 9)}`,
                email: `line${randomSuffix}@user.me`,
                statusMessage: '今天天氣真好！',
                friends: Math.floor(Math.random() * 500) + 50
            };
            
            console.log('Mock user data created:', mockUserData);
            
            showSuccess('模擬登入成功！正在跳轉...');
            
            // 將用戶資料傳遞給主頁面
            sessionStorage.setItem('line_user_data', JSON.stringify(mockUserData));
            console.log('User data stored in sessionStorage');
            
            // 2秒後跳轉到主頁面
            setTimeout(() => {
                console.log('Redirecting to main page...');
                window.location.href = LINE_LOGIN_CONFIG.redirectUri;
            }, 2000);
        }

        // 顯示登入按鈕
        function showLoginButton() {
            document.getElementById('login-content').classList.remove('hidden');
            document.getElementById('loading-content').classList.add('hidden');
            document.getElementById('status-message').innerHTML = '';
        }

        // 重定向到 LINE 登入
        function redirectToLineLogin() {
            console.log('Redirecting to LINE Login...');
            
            if (LINE_LOGIN_CONFIG.channelId === 'YOUR_CHANNEL_ID') {
                showError('請先設定您的 LINE Channel ID');
                return;
            }
            
            // 檢查是否為開發環境
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                console.log('Local environment detected, using simulated login');
                showSuccess('本地環境，使用模擬登入...');
                setTimeout(() => {
                    simulateLineLogin();
                }, 1000);
                return;
            }
            
            const authUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code&` +
                `client_id=${LINE_LOGIN_CONFIG.channelId}&` +
                `redirect_uri=${encodeURIComponent(LINE_LOGIN_CONFIG.redirectUri)}&` +
                `state=${LINE_LOGIN_CONFIG.state}&` +
                `scope=${LINE_LOGIN_CONFIG.scope}&` +
                `nonce=${LINE_LOGIN_CONFIG.nonce}`;
            
            console.log('LINE Auth URL:', authUrl);
            console.log('Redirect URI:', LINE_LOGIN_CONFIG.redirectUri);
            
            // 設定超時保護
            setTimeout(() => {
                console.log('LINE Login timeout, switching to simulated mode');
                showSuccess('LINE 登入超時，自動切換到模擬模式...');
                setTimeout(() => {
                    simulateLineLogin();
                }, 1500);
            }, 15000); // 15秒超時
            
            window.location.href = authUrl;
        }

        // 綁定登入按鈕事件
        document.getElementById('line-login-btn').addEventListener('click', redirectToLineLogin);

        // 頁面載入完成後處理
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, checking for callback...');
            handleLineCallback();
        });
    </script>
</body>
</html>
