<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入中 - MJ999</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00C300;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h2 {
            margin: 0 0 10px 0;
            color: #FFD700;
            font-size: 24px;
        }
        
        p {
            margin: 0;
            opacity: 0.8;
            font-size: 16px;
        }
        
        .error {
            color: #ff4444;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>LINE 登入處理中</h2>
        <p>正在驗證您的身份，請稍候...</p>
        <div id="error-message" class="error hidden"></div>
    </div>

    <script>
        // LINE Login 配置 - 避免手動 URL 編碼
        const LINE_LOGIN_CONFIG = {
            channelId: '2004473747', // 請替換為您的 LINE Channel ID
            redirectUri: window.location.origin + '/', // 動態獲取，避免編碼問題
            state: 'mj999_' + Date.now(), // 防止 CSRF 攻擊
            scope: 'profile openid',
            nonce: 'mj999_nonce_' + Date.now()
        };

        // 檢查 URL 參數
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                state: params.get('state'),
                error: params.get('error'),
                error_description: params.get('error_description')
            };
        }

        // 處理 LINE 登入回調
        async function handleLineCallback() {
            const params = getUrlParams();
            const errorElement = document.getElementById('error-message');
            
            try {
                // 檢查是否有錯誤
                if (params.error) {
                    throw new Error(params.error_description || params.error);
                }

                // 檢查 state 參數
                if (params.state !== LINE_LOGIN_CONFIG.state) {
                    throw new Error('State 驗證失敗，可能為安全攻擊');
                }

                // 如果有 code 參數，處理登入
                if (params.code) {
                    // 將 code 傳遞給主頁面
                    sessionStorage.setItem('line_code', params.code);
                    sessionStorage.setItem('line_state', params.state);
                    
                    // 重定向到主頁面
                    window.location.href = LINE_LOGIN_CONFIG.redirectUri;
                } else {
                    // 沒有 code，可能是直接訪問此頁面，重定向到 LINE 登入
                    redirectToLineLogin();
                }
                
            } catch (error) {
                console.error('LINE 登入錯誤:', error);
                errorElement.textContent = '登入失敗: ' + error.message;
                errorElement.classList.remove('hidden');
                
                // 5秒後自動重定向到主頁面
                setTimeout(() => {
                    window.location.href = LINE_LOGIN_CONFIG.redirectUri;
                }, 5000);
            }
        }

        // 重定向到 LINE 登入頁面
        function redirectToLineLogin() {
            const authUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code&` +
                `client_id=${LINE_LOGIN_CONFIG.channelId}&` +
                `redirect_uri=${encodeURIComponent(LINE_LOGIN_CONFIG.redirectUri)}&` +
                `state=${LINE_LOGIN_CONFIG.state}&` +
                `scope=${LINE_LOGIN_CONFIG.scope}&` +
                `nonce=${LINE_LOGIN_CONFIG.nonce}`;
            
            window.location.href = authUrl;
        }

        // 頁面載入完成後處理
        document.addEventListener('DOMContentLoaded', function() {
            handleLineCallback();
        });
    </script>
</body>
</html>
