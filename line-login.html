<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入中 - MJ999</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00C300;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h2 {
            margin: 0 0 10px 0;
            color: #FFD700;
            font-size: 24px;
        }
        
        p {
            margin: 0;
            opacity: 0.8;
            font-size: 16px;
        }
        
        .error {
            color: #ff4444;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }
        
        .success {
            color: #00C300;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 195, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(0, 195, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>LINE 登入處理中</h2>
        <p>正在驗證您的身份，請稍候...</p>
        <div id="status-message"></div>
    </div>

    <script>
        console.log('LINE Login Page Loaded');
        
        // 模擬 LINE 登入流程
        function simulateLineLogin() {
            const statusElement = document.getElementById('status-message');
            
            try {
                console.log('Starting simulated LINE login...');
                
                // 模擬登入延遲
                setTimeout(() => {
                    console.log('Creating mock user data...');
                    
                    // 創建模擬用戶資料 - 使用更真實的 LINE 用戶格式
                    const lineNames = [
                        '王小明', '李美華', '陳志強', '林雅婷', '張偉倫',
                        '陳淑芬', '劉德華', '張曼玉', '周潤發', '梁朝偉',
                        '林志玲', '蔡依林', '周杰倫', '王力宏', '林俊傑'
                    ];
                    
                    const randomName = lineNames[Math.floor(Math.random() * lineNames.length)];
                    const randomSuffix = Math.floor(Math.random() * 999);
                    
                    const mockUserData = {
                        userId: 'U' + Math.random().toString(36).substr(2, 9).toUpperCase(),
                        displayName: randomName + (randomSuffix > 100 ? randomSuffix : ''),
                        pictureUrl: `https://i.pravatar.cc/80?u=${Math.random().toString(36).substr(2, 9)}`,
                        email: `line${randomSuffix}@user.me`,
                        statusMessage: '今天天氣真好！',
                        friends: Math.floor(Math.random() * 500) + 50
                    };
                    
                    console.log('Mock user data created:', mockUserData);
                    
                    // 顯示成功訊息
                    statusElement.innerHTML = '<div class="success">登入成功！正在跳轉...</div>';
                    
                    // 將用戶資料傳遞給主頁面
                    sessionStorage.setItem('line_user_data', JSON.stringify(mockUserData));
                    console.log('User data stored in sessionStorage');
                    
                    // 2秒後重定向到主頁面
                    setTimeout(() => {
                        console.log('Redirecting to main page...');
                        window.location.href = window.location.origin + '/';
                    }, 2000);
                    
                }, 2000); // 2秒模擬延遲
                
            } catch (error) {
                console.error('LINE 登入錯誤:', error);
                statusElement.innerHTML = '<div class="error">登入失敗: ' + error.message + '</div>';
                
                // 5秒後自動重定向到主頁面
                setTimeout(() => {
                    window.location.href = window.location.origin + '/';
                }, 5000);
            }
        }

        // 頁面載入完成後開始模擬登入
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, starting simulation...');
            simulateLineLogin();
        });
    </script>
</body>
</html>
