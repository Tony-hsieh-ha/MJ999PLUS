<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ999 智能配對系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">MJ999 智能配對系統</h1>
            <p class="subtitle">麻將智能配對平台</p>
        </header>

        <main class="main-content">
            <!-- 登入區域 -->
            <div id="login-section" class="section">
                <div class="login-card">
                    <h2>玩家登入</h2>
                    <p>請使用 LINE 帳號登入以報名參加</p>
                    <button id="line-login-btn" class="btn btn-primary">
                        <span class="line-icon">LINE</span>
                        使用 LINE 登入
                    </button>
                </div>
            </div>

            <!-- 玩家資訊區域 -->
            <div id="user-section" class="section hidden">
                <div class="user-card">
                    <div class="user-info">
                        <div class="avatar">
                            <img id="user-avatar" src="https://via.placeholder.com/80" alt="用戶頭像">
                        </div>
                        <div class="user-details">
                            <h3 id="user-name">載入中...</h3>
                            <p id="user-id">ID: 載入中...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 報名區域 -->
            <div id="registration-section" class="section hidden">
                <div class="registration-card">
                    <h2>時段報名</h2>
                    <div class="time-slots">
                        <div class="time-slot" data-time="30/10">
                            <h3>30分鐘 / 10人桌</h3>
                            <p>快速遊戲模式</p>
                            <button class="btn btn-register" data-time="30/10">報名</button>
                            <div class="status-indicator"></div>
                        </div>
                        <div class="time-slot" data-time="60/20">
                            <h3>60分鐘 / 20人桌</h3>
                            <p>標準遊戲模式</p>
                            <button class="btn btn-register" data-time="60/20">報名</button>
                            <div class="status-indicator"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 管理員區域 -->
            <div id="admin-section" class="section hidden">
                <div class="admin-card">
                    <h2>管理後台</h2>
                    <div class="admin-controls">
                        <button id="view-players-btn" class="btn btn-secondary">查看報名清單</button>
                        <button id="add-player-btn" class="btn btn-secondary">手動新增玩家</button>
                        <button id="match-players-btn" class="btn btn-primary">一鍵配對</button>
                    </div>
                    <div id="players-list" class="players-list hidden">
                        <h3>報名清單</h3>
                        <div id="players-container"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 載入動畫 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>載入中...</p>
        </div>

        <!-- 訊息提示 -->
        <div id="message" class="message hidden"></div>
    </div>

    <script src="script-simple.js?v=20260330_simple"></script>
</body>
</html>
